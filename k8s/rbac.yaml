# ServiceAccount for the Kuboco backend, running in the "kuboco" namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuboco-backend
  namespace: kuboco
---
# Role scoped to "kuboco-containers" — least privilege, no cluster-wide access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kuboco-container-manager
  namespace: kuboco-containers
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
---
# Bind the SA in "kuboco" to the Role in "kuboco-containers"
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kuboco-backend-binding
  namespace: kuboco-containers
subjects:
  - kind: ServiceAccount
    name: kuboco-backend
    namespace: kuboco
roleRef:
  kind: Role
  name: kuboco-container-manager
  apiGroup: rbac.authorization.k8s.io
