# ServiceAccount for the Kuboco backend, running in the "kuboco" namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuboco-backend
  namespace: kuboco
---
# ClusterRole: manage pods/services in any kuboco-user-* namespace, and
# create/get namespaces and NetworkPolicies for the per-user namespace bootstrap.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuboco-container-manager
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list"]
---
# Bind the backend SA to the ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuboco-backend-binding
subjects:
  - kind: ServiceAccount
    name: kuboco-backend
    namespace: kuboco
roleRef:
  kind: ClusterRole
  name: kuboco-container-manager
  apiGroup: rbac.authorization.k8s.io
