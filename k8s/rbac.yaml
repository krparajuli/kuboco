# ServiceAccount for the Kokoko backend, running in the "kokoko" namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kokoko-backend
  namespace: kokoko
---
# Role scoped to "kokoko-containers" — least privilege, no cluster-wide access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kokoko-container-manager
  namespace: kokoko-containers
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status", "pods/log"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
---
# Bind the SA in "kokoko" to the Role in "kokoko-containers"
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kokoko-backend-binding
  namespace: kokoko-containers
subjects:
  - kind: ServiceAccount
    name: kokoko-backend
    namespace: kokoko
roleRef:
  kind: Role
  name: kokoko-container-manager
  apiGroup: rbac.authorization.k8s.io
