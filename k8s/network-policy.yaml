# NetworkPolicies are applied dynamically per-user-namespace by the backend
# (k8s_controller._sync_ensure_user_namespace) when a user first spawns a container.
#
# Each kuboco-user-{id} namespace gets:
#   deny-all-ingress  — blocks all pod ingress by default
#   allow-from-backend — permits ingress only from kuboco-backend pods in the kuboco ns
#
# This file is kept for reference. The backend creates equivalent policies via
# the Kubernetes Python client, so there is nothing to kubectl-apply here.
