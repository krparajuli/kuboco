apiVersion: v1
kind: ConfigMap
metadata:
  name: kuboco-config
  namespace: kuboco
data:
  CONTAINER_NAMESPACE: "kuboco-containers"
  BACKEND_NAMESPACE:   "kuboco"
  CONTAINER_IMAGE:     "kuboco/ubuntu-ttyd:latest"
  DATABASE_URL:        "sqlite+aiosqlite:////app/data/kuboco.db"
  TTYD_PORT:           "7681"
  MAX_CONTAINERS_PER_USER: "5"
---
# Store the SECRET_KEY in a Kubernetes Secret (base64-encoded).
# Replace the value with: echo -n "your-secret" | base64
apiVersion: v1
kind: Secret
metadata:
  name: kuboco-secrets
  namespace: kuboco
type: Opaque
stringData:
  SECRET_KEY: "CHANGE-ME-generate-with-openssl-rand-hex-32"
---
# PersistentVolumeClaim for SQLite database storage.
# For production, consider using PostgreSQL instead.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kuboco-db-pvc
  namespace: kuboco
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuboco-backend
  namespace: kuboco
  labels:
    app: kuboco-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kuboco-backend
  template:
    metadata:
      labels:
        app: kuboco-backend
    spec:
      serviceAccountName: kuboco-backend
      containers:
        - name: backend
          image: kuboco/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kuboco-config
            - secretRef:
                name: kuboco-secrets
          volumeMounts:
            - name: db-storage
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: kuboco-db-pvc
---
# NodePort Service — accessible via <NodeIP>:30080
apiVersion: v1
kind: Service
metadata:
  name: kuboco-backend-svc
  namespace: kuboco
  labels:
    app: kuboco-backend
spec:
  selector:
    app: kuboco-backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
  type: NodePort
